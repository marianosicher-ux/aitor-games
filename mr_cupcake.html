<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mr. Cupcake | Aitor Games Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Bangers&family=Luckiest+Guy&display=swap');

        :root {
            --electric: #00e5ff;
            --pastry-pink: #ff80ab;
            --mint: #b9f6ca;
            --lavender: #e1bee7;
            --peach: #ffccbc;
            --chocolate: #5d4037;
            --vanilla: #fff9c4;
            --victory-gold: #ffd700;
            --neon-pink: #ff4d94;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0e18;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            touch-action: none;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 50px;
            background-color: rgba(11, 14, 24, 0.95);
        }

        .logo {
            font-weight: bold;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: white; text-decoration: none; font-size: 0.9rem; }

        .btn-unirse {
            background: linear-gradient(90deg, #9b30ff, #7022c4);
            padding: 6px 15px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .game-header { text-align: center; padding: 10px 0; }
        .game-title {
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
            color: var(--neon-pink);
            font-family: 'Luckiest Guy', cursive;
        }

        .game-subtitle {
            display: inline-block;
            background: #2a1b4d;
            color: #b080ff;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: bold;
        }

        #game-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            height: 500px;
            background: #fff;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 77, 148, 0.3);
            border: 10px solid var(--chocolate);
        }

        canvas { display: block; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(4px);
            box-sizing: border-box;
            font-family: 'Pacifico', cursive;
        }

        .hidden { display: none !important; }

        #ui-hud {
            position: absolute;
            top: 15px; left: 20px; right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 20;
            color: var(--chocolate);
            font-size: 22px;
            text-shadow: 1px 1px 0px white;
            font-family: 'Pacifico', cursive;
        }

        h1 { color: #ad1457; font-size: 50px; margin: 0; transform: rotate(-2deg); }

        .btn-fancy {
            padding: 8px 30px;
            font-size: 16px;
            background: var(--pastry-pink);
            color: white;
            border: 3px solid var(--chocolate);
            cursor: pointer;
            border-radius: 50px;
            font-family: 'Pacifico', cursive;
            box-shadow: 0 4px 0 var(--chocolate);
        }

        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .level-btn { width: 45px; height: 45px; background: var(--mint); border: 2px solid var(--chocolate); border-radius: 10px; font-family: 'Pacifico', cursive; cursor: pointer; }

        #player-hp-container, #boss-hp-container { position: absolute; left: 50%; transform: translateX(-50%); z-index: 20; width: 40%; }
        #player-hp-container { top: 55px; }
        #boss-hp-container { bottom: 15px; width: 55%; }

        .hp-bar { width: 100%; height: 10px; background: #eee; border: 2px solid var(--chocolate); border-radius: 8px; overflow: hidden; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.1s; }
        #player-fill { background: #4caf50; }
        #boss-fill { background: #ff1744; }

        .controls-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(11, 14, 24, 0.5);
            font-size: 0.8rem;
            color: #a0a0ff;
        }

        .icon { color: var(--neon-pink); margin-right: 5px; }
    </style>
</head>
<body onclick="initAudioOnce()">

    <nav>
        <div class="logo">🎮 AITOR GAMES</div>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="index.html#joyas">Juegos</a>
        </div>
        <a href="#" class="btn-unirse">Unirse</a>
    </nav>

    <div class="game-header">
        <h1 class="game-title">MR. CUPCAKE</h1>
        <div class="game-subtitle">ULTRA OPTIMIZED EDITION</div>
    </div>

    <div id="game-wrapper">
        <div id="game-container">
            <div id="ui-hud">
                <div id="health-display">⚡⚡⚡</div>
                <div id="level-display">NIVEL 1</div>
                <div id="score-display">0 PTS</div>
            </div>

            <div id="player-hp-container" class="hidden">
                <div class="hp-bar"><div id="player-fill" class="hp-fill"></div></div>
            </div>

            <div id="boss-hp-container" class="hidden">
                <div class="hp-bar"><div id="boss-fill" class="hp-fill"></div></div>
            </div>

            <div id="screen-splash" class="overlay">
                <h2 style="font-size: 40px; color: #ad1457;">Studio Siche Miche</h2>
                <div style="font-size: 30px;">🧁⚡</div>
                <p style="font-size: 11px; opacity: 0.6;">(Clickeá para sonido)</p>
            </div>

            <div id="screen-menu" class="overlay hidden">
                <h1>Mr. Cupcake</h1>
                <div style="height: 100px;"></div>
                <div class="btn-group">
                    <button class="btn-fancy" onclick="startEverything()">¡DALE PLAY!</button>
                    <button class="btn-fancy" style="background: var(--mint); color: #2e7d32;" onclick="showOverlay('level-select')">ELEGIR NIVEL</button>
                </div>
            </div>

            <div id="screen-level-select" class="overlay hidden">
                <h2 style="font-size: 25px;">Seleccionar Nivel</h2>
                <div class="level-grid" id="level-buttons-container"></div>
                <button class="btn-fancy" style="margin-top: 15px;" onclick="showOverlay('menu')">VOLVER</button>
            </div>

            <div id="screen-pause" class="overlay hidden">
                <h1>PAUSA</h1>
                <button class="btn-fancy" onclick="togglePause()">CONTINUAR</button>
            </div>

            <div id="screen-gameover" class="overlay hidden">
                <h1 style="color: #d32f2f;">GAME OVER</h1>
                <p id="final-stats"></p>
                <button class="btn-fancy" onclick="location.reload()">REINTENTAR</button>
            </div>

            <div id="screen-win" class="overlay hidden">
                <h1 style="color: var(--victory-gold);">¡VICTORIA!</h1>
                <button class="btn-fancy" onclick="location.reload()">INICIO</button>
            </div>

            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <div class="controls-footer">
        <div><span class="icon">⌨️</span><b>Z:</b> Volar</div>
        <div><span class="icon">⌨️</span><b>X:</b> Disparar</div>
        <div><span class="icon">🕹️</span><b>Flechas</b></div>
    </div>

    <script>
        /** ENGINE MINIFICADO PARA RENDIMIENTO **/
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function initAudioOnce() { if (!audioCtx) { audioCtx = new AudioContext(); startMusic(); } }
        function playTone(f, d, t = 'square', v = 0.03) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }

        const adventureMelody = [261, 329, 392, 523, 392, 329, 261, 293, 349, 440];
        let mIdx = 0;
        function startMusic() {
            const n = () => {
                if (!isPaused && gameState === 'playing') {
                    playTone(adventureMelody[mIdx], 0.15);
                    mIdx = (mIdx + 1) % adventureMelody.length;
                    setTimeout(n, 250);
                } else setTimeout(n, 500);
            };
            n();
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimización: fondo opaco
        canvas.width = 800; canvas.height = 500;

        let gameState = 'splash', isPaused = false, currentLevel = 1, score = 0, lastScore = -1, cameraX = 0;
        const WORLD_WIDTH = 4000, gravity = 0.45;
        const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false, KeyZ: false, KeyX: false };

        class Player {
            constructor() { this.reset(); this.trail = []; }
            reset() {
                this.x = 150; this.y = 100; this.vx = 0; this.vy = 0;
                this.health = 3; this.invul = 0; this.facing = 1;
            }
            update() {
                if (gameState !== 'playing' || isPaused) return;
                if (keys.ArrowLeft) { this.vx = -6; this.facing = -1; }
                else if (keys.ArrowRight) { this.vx = 6; this.facing = 1; }
                else this.vx *= 0.8;

                if (keys.KeyZ) { this.vy -= 0.8; } else { this.vy += gravity; }
                this.x += this.vx; this.y += this.vy;

                if (this.trail.length > 4) this.trail.shift();
                this.trail.push({x: this.x, y: this.y});

                if (this.y > 600) this.takeDamage(true);
                if (this.x < 0) this.x = 0;
                let limit = (currentLevel === 10 ? 800 : WORLD_WIDTH);
                if (this.x > limit - 60 && currentLevel < 10) winLevel();
                if (this.invul > 0) this.invul--;
            }
            draw() {
                if (this.invul % 10 > 5) return;
                ctx.fillStyle = '#ff80ab';
                for(let t of this.trail) ctx.fillRect(t.x+10, t.y+10, 25, 25);
                ctx.fillStyle = '#4e342e';
                ctx.fillRect(this.x, this.y+10, 45, 30); // Cuerpo simplificado
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + 10 + (this.facing*5), this.y+15, 8, 8);
                ctx.fillRect(this.x + 25 + (this.facing*5), this.y+15, 8, 8);
            }
            takeDamage(fall) {
                if (this.invul > 0) return;
                this.health--; this.invul = 60;
                if (fall) { this.x -= 300; this.y = 50; this.vy = 0; }
                updateHUD(true);
                if (this.health <= 0) endGame('gameover');
            }
        }

        class Enemy {
            constructor(x, y) { this.x = x; this.y = y; this.vx = 3; this.ox = x; }
            update() { this.x += this.vx; if (Math.abs(this.x - this.ox) > 150) this.vx *= -1; }
            draw() { ctx.fillStyle = '#795548'; ctx.fillRect(this.x, this.y, 40, 40); }
        }

        class Bullet {
            constructor(x, y, vx, vy) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; }
            update() { this.x += this.vx; this.y += this.vy; }
            draw() { ctx.fillStyle = '#00e5ff'; ctx.fillRect(this.x, this.y, 10, 6); }
        }

        const player = new Player();
        let platforms = [], enemies = [], bullets = [], particles = [];

        function initLevel() {
            cameraX = 0; platforms = []; enemies = []; bullets = [];
            if (currentLevel < 10) {
                let lx = 0;
                for(let i=0; i<20; i++) {
                    let w = 300;
                    platforms.push({x: lx, y: 400, w: w});
                    if (i > 1) enemies.push(new Enemy(lx + 50, 360));
                    lx += w + 150;
                }
            } else {
                platforms.push({x: 0, y: 450, w: 800});
                boss = {x: 600, y: 100, hp: 100, vy: 4};
                document.getElementById('boss-hp-container').classList.remove('hidden');
            }
            updateHUD(true);
        }

        function update() {
            if (isPaused || gameState !== 'playing') return;
            player.update();
            cameraX = Math.max(0, player.x - 300);
            
            for(let i=bullets.length-1; i>=0; i--) {
                let b = bullets[i]; b.update();
                enemies.forEach((e, ei) => {
                    if (b.x > e.x && b.x < e.x+40 && b.y > e.y && b.y < e.y+40) {
                        enemies.splice(ei, 1); bullets.splice(i, 1); score += 100;
                    }
                });
                if (b.x > player.x + 800) bullets.splice(i, 1);
            }

            platforms.forEach(p => {
                if (player.vy > 0 && player.x+40 > p.x && player.x < p.x+p.w && player.y+60 > p.y && player.y+60 < p.y+20) {
                    player.y = p.y - 60; player.vy = 0;
                }
            });

            enemies.forEach(e => {
                e.update();
                if (player.x+40 > e.x && player.x < e.x+40 && player.y+60 > e.y && player.y < e.y+40) player.takeDamage();
            });
            
            if (score !== lastScore) updateHUD();
        }

        function draw() {
            ctx.fillStyle = '#f0f8ff'; ctx.fillRect(0,0,800,500); // Fondo liso
            ctx.save(); ctx.translate(-cameraX, 0);
            
            ctx.fillStyle = '#8d6e63';
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.w, 40);
                ctx.fillStyle = 'white'; ctx.fillRect(p.x, p.y, p.w, 4); // Línea superior
                ctx.fillStyle = '#8d6e63';
            });

            enemies.forEach(e => e.draw());
            bullets.forEach(b => b.draw());
            player.draw();
            ctx.restore();
        }

        function updateHUD(force = false) {
            if (!force && score === lastScore) return;
            lastScore = score;
            document.getElementById('health-display').innerText = "⚡".repeat(player.health);
            document.getElementById('level-display').innerText = `NIVEL ${currentLevel}`;
            document.getElementById('score-display').innerText = `${score} PTS`;
        }

        function changeState(s) {
            gameState = s;
            document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
            if (s === 'playing') initLevel();
            else document.getElementById(`screen-${s}`).classList.remove('hidden');
        }

        function startEverything() { initAudioOnce(); changeState('playing'); }
        function togglePause() { isPaused = !isPaused; document.getElementById('screen-pause').classList.toggle('hidden', !isPaused); }
        function winLevel() { currentLevel++; if(currentLevel > 10) endGame('win'); else initLevel(); }
        function endGame(t) { gameState = t; document.getElementById(`screen-${t}`).classList.remove('hidden'); }

        window.addEventListener('keydown', e => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
            if (e.code === 'KeyX' && gameState === 'playing') {
                bullets.push(new Bullet(player.x+40, player.y+30, 12, 0));
                playTone(600, 0.05);
            }
            if (e.code === 'Escape') togglePause();
        });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        
        const lc = document.getElementById('level-buttons-container');
        for(let i=1; i<=10; i++) {
            const b = document.createElement('button'); b.className='level-btn'; b.innerText=i;
            b.onclick=()=>{currentLevel=i; startEverything();}; lc.appendChild(b);
        }

        setTimeout(() => changeState('menu'), 2000);
        loop();
    </script>
</body>
</html>
