<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum Mundial Manager 2026</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome para los íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React y ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #020617; } /* slate-950 */
        /* Ocultar scrollbar para que quede más limpio en el iframe */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="text-slate-100 font-sans selection:bg-amber-500">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONSTANTES DEL JUEGO ---
        const COUNTRIES = ["Argentina", "Brasil", "España", "Francia", "Inglaterra", "Alemania", "Italia", "Portugal", "Uruguay", "México"];
        const NAMES = {
            n: ["Julián", "Lautaro", "Enzo", "Vinícius", "Lamine", "Kylian", "Jude", "Harry", "Phil", "Bukayo", "Nico", "Gavi", "Pedri", "Rodrygo", "Endrick", "Dibu", "Cuti"],
            a: ["Fernández", "Martínez", "Álvarez", "Júnior", "Yamal", "Mbappé", "Bellingham", "Kane", "Foden", "Saka", "Williams", "Páez", "Güler", "Romero", "Messi"]
        };

        const RARITIES = [
            { id: 'common', name: 'Bronce', chance: 0.6, style: 'bg-orange-100 border-orange-400 text-orange-900', power: [70, 78], value: 50 },
            { id: 'silver', name: 'Plata', chance: 0.25, style: 'bg-slate-200 border-slate-500 text-slate-800', power: [79, 84], value: 150 },
            { id: 'gold', name: 'Oro', chance: 0.1, style: 'bg-yellow-100 border-yellow-600 text-yellow-900', power: [85, 90], value: 500 },
            { id: 'platinum', name: 'Platino', chance: 0.04, style: 'bg-cyan-100 border-cyan-500 text-blue-900', power: [91, 94], value: 1500 },
            { id: 'extra', name: 'EXTRA GOLD', chance: 0.01, style: 'bg-slate-950 border-amber-500 text-amber-500 shadow-xl', power: [95, 99], value: 5000 }
        ];

        const DEFAULT_STATE = {
            coins: 1000,
            inventory: [],
            album: {},
            standardPacks: 5,
            lastStandardClaim: Date.now(),
            lastExtraClaim: 0,
            trainingHistory: 0
        };

        function App() {
            const [activeTab, setActiveTab] = useState('album');
            const [showReveal, setShowReveal] = useState(null);
            const [currentCountryIdx, setCurrentCountryIdx] = useState(0);
            const [toast, setToast] = useState(null);

            // Cargar estado desde LocalStorage o usar default
            const [state, setState] = useState(() => {
                const saved = localStorage.getItem('aitor_album_data');
                if (saved) {
                    try { return JSON.parse(saved); } catch (e) { return DEFAULT_STATE; }
                }
                return DEFAULT_STATE;
            });

            // Guardar estado en LocalStorage cada vez que cambia
            useEffect(() => {
                localStorage.setItem('aitor_album_data', JSON.stringify(state));
            }, [state]);

            // --- LÓGICA DE TIEMPO Y RECARGA ---
            const [timeLeft, setTimeLeft] = useState({ standard: 0, extra: 0 });

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = Date.now();
                    const hourMs = 3600000;
                    const extraMs = 23 * hourMs;

                    // Cálculo de sobres estándar (3 cada 1 hora)
                    const elapsedStd = now - state.lastStandardClaim;
                    if (elapsedStd >= hourMs) {
                        const newPacks = Math.floor(elapsedStd / hourMs) * 3;
                        setState(prev => ({ 
                            ...prev, 
                            standardPacks: prev.standardPacks + newPacks,
                            lastStandardClaim: now - (elapsedStd % hourMs) // Ajuste fino
                        }));
                    }

                    setTimeLeft({
                        standard: Math.max(0, hourMs - (elapsedStd % hourMs)),
                        extra: Math.max(0, extraMs - (now - state.lastExtraClaim))
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [state.lastStandardClaim, state.lastExtraClaim]);

            // Mostrar notificaciones
            const showMessage = (msg, type = 'info') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            // --- ACCIONES DEL JUEGO ---
            const generateCard = (forceRarity = null) => {
                const country = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
                const name = `${NAMES.n[Math.floor(Math.random() * NAMES.n.length)]} ${NAMES.a[Math.floor(Math.random() * NAMES.a.length)]}`;
                
                let rarity;
                if (forceRarity) {
                    rarity = RARITIES.find(r => r.id === forceRarity);
                } else {
                    const r = Math.random();
                    let cum = 0;
                    for (let rar of RARITIES) {
                        cum += rar.chance;
                        if (r <= cum) { rarity = rar; break; }
                    }
                }

                return {
                    id: Math.random().toString(36).substr(2, 9),
                    name,
                    country,
                    rarityId: rarity.id,
                    power: Math.floor(Math.random() * (rarity.power[1] - rarity.power[0])) + rarity.power[0],
                    level: 1
                };
            };

            const openStandardPack = () => {
                if (state.standardPacks <= 0) return;
                const newCards = Array.from({ length: 5 }, () => generateCard());
                setState(prev => ({ 
                    ...prev, 
                    standardPacks: prev.standardPacks - 1, 
                    inventory: [...prev.inventory, ...newCards] 
                }));
                setShowReveal(newCards);
            };

            const openExtraPack = () => {
                if (timeLeft.extra > 0) return;
                const newCards = Array.from({ length: 4 }, (_, i) => generateCard(i === 3 ? 'extra' : null));
                setState(prev => ({ 
                    ...prev, 
                    lastExtraClaim: Date.now(), 
                    inventory: [...prev.inventory, ...newCards] 
                }));
                setShowReveal(newCards);
            };

            const stickCard = (card) => {
                const country = card.country;
                const countryAlbum = state.album[country] || [];
                
                const existingIdx = countryAlbum.findIndex(c => c.name === card.name);
                if (existingIdx !== -1) {
                    if (card.power > countryAlbum[existingIdx].power) {
                        const oldCard = countryAlbum[existingIdx];
                        const newAlbum = [...countryAlbum];
                        newAlbum[existingIdx] = card;
                        setState(prev => ({
                            ...prev,
                            album: { ...prev.album, [country]: newAlbum },
                            inventory: prev.inventory.filter(c => c.id !== card.id).concat(oldCard)
                        }));
                        showMessage("¡Figura mejorada pegada con éxito!", "success");
                    } else {
                        showMessage("Ya tenés una versión mejor de este jugador pegada en el álbum.", "error");
                    }
                } else {
                    if (countryAlbum.length >= 11) {
                        showMessage("¡La selección de este país ya está llena (11 jugadores)!", "error");
                        return;
                    }
                    setState(prev => ({
                        ...prev,
                        album: { ...prev.album, [country]: [...countryAlbum, card] },
                        inventory: prev.inventory.filter(c => c.id !== card.id)
                    }));
                    showMessage("¡Figura pegada al álbum!", "success");
                }
            };

            const sellCard = (card) => {
                const rarity = RARITIES.find(r => r.id === card.rarityId);
                setState(prev => ({
                    ...prev,
                    coins: prev.coins + rarity.value,
                    inventory: prev.inventory.filter(c => c.id !== card.id)
                }));
                showMessage(`Vendiste a ${card.name} por ${rarity.value} monedas.`, "success");
            };

            const trainCard = (card) => {
                if (state.coins < 200) {
                    showMessage("No tenés monedas suficientes (200).", "error");
                    return;
                }
                if (card.power >= 99) {
                    showMessage("Este jugador ya está al máximo.", "error");
                    return;
                }
                
                const country = card.country;
                const newAlbum = state.album[country].map(c => 
                    c.id === card.id ? { ...c, power: Math.min(99, c.power + 1), level: c.level + 1 } : c
                );

                setState(prev => ({
                    ...prev,
                    coins: prev.coins - 200,
                    album: { ...prev.album, [country]: newAlbum }
                }));
                showMessage(`¡${card.name} subió de nivel!`, "success");
            };

            const formatTime = (ms) => {
                const h = Math.floor(ms / 3600000);
                const m = Math.floor((ms % 3600000) / 60000);
                const s = Math.floor((ms % 60000) / 1000);
                return `${h}h ${m}m ${s}s`;
            };

            const currentCountry = COUNTRIES[currentCountryIdx];

            return (
                <div className="min-h-screen pb-24 relative">
                    {/* TOAST NOTIFICATIONS */}
                    {toast && (
                        <div className={`fixed top-20 right-4 z-50 px-4 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2 animate-bounce
                            ${toast.type === 'error' ? 'bg-red-500 text-white' : 'bg-green-500 text-slate-900'}`}>
                            <i className={`fa-solid ${toast.type === 'error' ? 'fa-triangle-exclamation' : 'fa-check'}`}></i>
                            {toast.msg}
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="bg-slate-900 border-b border-white/5 p-4 sticky top-0 z-40 shadow-md">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/20">
                                    <i className="fa-solid fa-trophy text-slate-900 text-xl"></i>
                                </div>
                                <div>
                                    <h1 className="text-xs font-black uppercase tracking-tighter text-amber-500">Mundial 2026</h1>
                                    <p className="text-lg font-black italic uppercase leading-none">Manager</p>
                                </div>
                            </div>
                            <div className="bg-slate-800 px-4 py-2 rounded-2xl flex items-center gap-2 border border-white/10">
                                <i className="fa-solid fa-coins text-green-400"></i>
                                <span className="font-black text-green-400">{state.coins}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 pt-6">
                        {/* TABS */}
                        <div className="flex gap-2 mb-8 bg-slate-900/50 p-1.5 rounded-2xl border border-white/5">
                            {[
                                { id: 'album', icon: 'fa-book', label: 'Álbum' },
                                { id: 'inventory', icon: 'fa-layer-group', label: 'Figuritas' },
                                { id: 'market', icon: 'fa-store', label: 'Tienda' }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex-1 py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-sm transition-all ${activeTab === tab.id ? 'bg-amber-500 text-slate-950 shadow-lg' : 'hover:bg-white/5 text-slate-400'}`}
                                >
                                    <i className={`fa-solid ${tab.icon}`}></i> <span className="hidden sm:inline">{tab.label}</span>
                                </button>
                            ))}
                        </div>

                        {/* --- ÁLBUM --- */}
                        {activeTab === 'album' && (
                            <div className="space-y-6">
                                <div className="flex items-center justify-between bg-slate-900 p-6 rounded-[2rem] border border-white/5 shadow-inner">
                                    <button onClick={() => setCurrentCountryIdx((i) => (i - 1 + COUNTRIES.length) % COUNTRIES.length)} className="p-3 bg-white/5 rounded-full hover:bg-white/10 transition-colors"><i className="fa-solid fa-chevron-left"></i></button>
                                    <div className="text-center">
                                        <span className="text-[10px] font-black text-amber-500 uppercase tracking-widest">Selección</span>
                                        <h2 className="text-3xl sm:text-4xl font-black italic uppercase tracking-tighter">{currentCountry}</h2>
                                        <div className="text-xs text-slate-400 mt-1 font-bold">{state.album[currentCountry]?.length || 0} / 11 Jugadores</div>
                                    </div>
                                    <button onClick={() => setCurrentCountryIdx((i) => (i + 1) % COUNTRIES.length)} className="p-3 bg-white/5 rounded-full hover:bg-white/10 transition-colors"><i className="fa-solid fa-chevron-right"></i></button>
                                </div>

                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                                    {Array.from({ length: 11 }).map((_, i) => {
                                        const card = state.album[currentCountry]?.[i];
                                        if (!card) return (
                                            <div key={i} className="aspect-[3/4] rounded-2xl border-2 border-dashed border-white/10 bg-white/5 flex flex-col items-center justify-center text-white/20 gap-2">
                                                <i className="fa-solid fa-user-plus text-3xl"></i>
                                                <span className="text-[10px] font-bold uppercase">Vacío</span>
                                            </div>
                                        );
                                        const r = RARITIES.find(rar => rar.id === card.rarityId);
                                        return (
                                            <div key={card.id} className={`${r.style} aspect-[3/4] rounded-2xl border-2 p-3 flex flex-col relative group overflow-hidden shadow-xl transition-transform hover:-translate-y-2`}>
                                                <div className="flex justify-between items-start">
                                                    <span className="text-2xl font-black italic leading-none">{card.power}</span>
                                                    <span className="text-[8px] font-black uppercase opacity-60 bg-black/10 px-2 py-0.5 rounded-full">LVL {card.level}</span>
                                                </div>
                                                <div className="mt-auto">
                                                    <p className="text-[11px] font-black leading-tight uppercase truncate">{card.name}</p>
                                                    <p className="text-[8px] font-bold opacity-70 uppercase tracking-tighter">{r.name}</p>
                                                </div>
                                                {/* Botón de Entrenamiento */}
                                                <button 
                                                    onClick={() => trainCard(card)}
                                                    className="absolute inset-0 bg-slate-900/95 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm"
                                                >
                                                    <div className="text-center">
                                                        <i className="fa-solid fa-dumbbell text-green-400 text-xl mb-2"></i>
                                                        <div className="text-green-400 font-black text-xs mb-1 uppercase tracking-widest">Entrenar</div>
                                                        <div className="text-[10px] font-bold text-white/60 bg-black/50 px-2 py-1 rounded-full">200 🪙</div>
                                                    </div>
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* --- INVENTARIO --- */}
                        {activeTab === 'inventory' && (
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                                {state.inventory.length === 0 ? (
                                    <div className="col-span-full py-20 text-center opacity-30">
                                        <i className="fa-solid fa-box-open text-6xl mb-4"></i>
                                        <p className="italic font-bold">No tenés figuritas sueltas. ¡Andá a abrir sobres!</p>
                                    </div>
                                ) : (
                                    state.inventory.map(card => {
                                        const r = RARITIES.find(rar => rar.id === card.rarityId);
                                        return (
                                            <div key={card.id} className={`${r.style} p-4 rounded-2xl border-2 flex flex-col items-center text-center gap-1 shadow-md group relative`}>
                                                <span className="text-3xl font-black italic">{card.power}</span>
                                                <span className="text-xs font-bold uppercase truncate w-full">{card.name}</span>
                                                <span className="text-[9px] opacity-80 uppercase font-black">{card.country}</span>
                                                
                                                <div className="absolute inset-0 bg-slate-900/95 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity flex flex-col p-3 gap-2 backdrop-blur-sm justify-center">
                                                    <button onClick={() => stickCard(card)} className="w-full py-2 bg-amber-500 text-slate-950 rounded-lg text-xs font-black uppercase transition-transform hover:scale-105 shadow-lg shadow-amber-500/20">
                                                        Pegar
                                                    </button>
                                                    <button onClick={() => sellCard(card)} className="w-full py-2 bg-slate-800 border border-red-500/50 text-red-400 rounded-lg text-[10px] font-black uppercase flex items-center justify-center gap-1 hover:bg-red-500/10 transition-colors">
                                                        <i className="fa-solid fa-trash-can"></i> Vender ({r.value})
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>
                        )}

                        {/* --- TIENDA --- */}
                        {activeTab === 'market' && (
                            <div className="grid md:grid-cols-2 gap-6">
                                {/* Sobre Estándar */}
                                <div className="bg-slate-900 border border-white/5 rounded-[2.5rem] p-8 flex flex-col items-center text-center shadow-lg">
                                    <div className="w-24 h-24 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl mb-6 shadow-2xl shadow-blue-500/20 flex items-center justify-center rotate-3 border-2 border-white/10">
                                        <i className="fa-solid fa-box text-white text-4xl"></i>
                                    </div>
                                    <h3 className="text-2xl font-black italic uppercase tracking-tighter mb-2">Sobre Común</h3>
                                    <p className="text-sm text-slate-400 mb-6 px-4">Trae 5 figuritas al azar. Te regalamos 3 sobres nuevos cada hora de juego.</p>
                                    
                                    <div className="w-full bg-slate-800 rounded-2xl p-4 mb-6 flex justify-between items-center border border-white/5">
                                        <div className="text-left">
                                            <div className="text-[10px] font-bold text-slate-500 uppercase">Tus Sobres</div>
                                            <div className="text-2xl font-black text-blue-400">{state.standardPacks}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] font-bold text-amber-500 uppercase flex items-center gap-1 justify-end"><i className="fa-regular fa-clock"></i> Recarga</div>
                                            <div className="text-sm font-bold font-mono">{formatTime(timeLeft.standard)}</div>
                                        </div>
                                    </div>

                                    <button 
                                        onClick={openStandardPack}
                                        disabled={state.standardPacks <= 0}
                                        className="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase tracking-widest disabled:opacity-30 disabled:cursor-not-allowed hover:bg-blue-500 transition-colors shadow-lg shadow-blue-600/20"
                                    >
                                        Abrir (Restan {state.standardPacks})
                                    </button>
                                </div>

                                {/* Sobre Extra 23h */}
                                <div className="bg-slate-900 border border-amber-500/30 rounded-[2.5rem] p-8 flex flex-col items-center text-center relative overflow-hidden shadow-lg shadow-amber-500/5">
                                    <div className="absolute top-5 right-5 bg-amber-500 text-slate-950 text-[9px] font-black px-3 py-1.5 rounded-full uppercase tracking-tighter shadow-md">Premium</div>
                                    <div className="w-24 h-24 bg-gradient-to-br from-amber-400 to-orange-600 rounded-3xl mb-6 shadow-2xl shadow-amber-500/30 flex items-center justify-center -rotate-3 border-2 border-white/20">
                                        <i className="fa-solid fa-star text-slate-900 text-4xl"></i>
                                    </div>
                                    <h3 className="text-2xl font-black italic uppercase tracking-tighter mb-2 text-amber-400">Mega Pack 24H</h3>
                                    <p className="text-sm text-slate-400 mb-6 px-4">Trae 4 figuritas y te garantiza <b className="text-amber-500">1 carta EXTRA GOLD</b> asegurada.</p>
                                    
                                    <div className="w-full bg-slate-800 rounded-2xl p-4 mb-6 text-center border border-amber-500/10">
                                        <div className="text-[10px] font-bold text-amber-500 uppercase mb-1">Próximo disponible en</div>
                                        <div className="text-2xl font-black font-mono tracking-widest text-slate-200">
                                            {timeLeft.extra <= 0 ? "¡LISTO PARA ABRIR!" : formatTime(timeLeft.extra)}
                                        </div>
                                    </div>

                                    <button 
                                        onClick={openExtraPack}
                                        disabled={timeLeft.extra > 0}
                                        className="w-full py-4 bg-amber-500 text-slate-950 rounded-2xl font-black uppercase tracking-widest disabled:opacity-30 disabled:cursor-not-allowed hover:bg-amber-400 transition-all shadow-lg shadow-amber-500/20"
                                    >
                                        Reclamar Pack
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* --- PANTALLA DE REVELACIÓN (PACK OPENING) --- */}
                    {showReveal && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/98 backdrop-blur-xl flex flex-col items-center justify-center p-8 overflow-y-auto">
                            <div className="mb-10 text-center">
                                <h2 className="text-4xl sm:text-5xl font-black italic uppercase tracking-tighter text-amber-400 mb-2 drop-shadow-lg">¡Nuevos Fichajes!</h2>
                                <p className="text-slate-300 uppercase text-xs sm:text-sm font-bold tracking-[0.3em]">Tus cartas fueron al inventario</p>
                            </div>
                            
                            <div className="flex flex-wrap justify-center gap-4 sm:gap-6 max-w-5xl mb-12">
                                {showReveal.map((c, i) => {
                                    const r = RARITIES.find(rar => rar.id === c.rarityId);
                                    // Animación escalonada básica simulada con inline styles
                                    return (
                                        <div key={i} style={{ animationDelay: `${i * 150}ms` }} className={`${r.style} w-36 sm:w-44 p-4 sm:p-6 rounded-[2rem] border-4 flex flex-col items-center gap-3 sm:gap-4 shadow-2xl scale-100 hover:scale-105 transition-transform animate-[pulse_1s_ease-in-out_1]`}>
                                            <div className="text-5xl sm:text-6xl font-black italic tracking-tighter drop-shadow-md">{c.power}</div>
                                            <div className="text-center w-full">
                                                <div className="text-[11px] sm:text-xs font-black uppercase tracking-tighter leading-tight mb-1 truncate">{c.name}</div>
                                                <div className="text-[9px] sm:text-[10px] font-bold opacity-80 uppercase">{c.country}</div>
                                            </div>
                                            <div className="px-3 py-1 rounded-full bg-black/15 text-[9px] font-black italic uppercase shadow-inner">{r.name}</div>
                                        </div>
                                    );
                                })}
                            </div>

                            <button 
                                onClick={() => setShowReveal(null)}
                                className="px-10 py-4 bg-white text-slate-950 font-black rounded-full uppercase tracking-widest hover:scale-105 transition-transform shadow-xl hover:bg-slate-200"
                            >
                                Continuar
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
